<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coin Flip — Sketch</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gill+Sans:wght@400;500&display=swap">
</head>
<body>
  <figure class="sketch" id="sketch">

    <!-- == Controls ========================================================== -->
    <div class="sketch-controls">
      <div class="control control-manual">
        <button type="button" id="flipBtn">Flip Coin</button>
      </div>

      <div class="control control-auto">
        <button type="button" id="playBtn">Play</button>
        <label class="control-delay">
          Delay
          <input type="number" id="delayInput" min="1" max="999" step="1" value="100">
          ms
        </label>
      </div>

      <div class="control control-reset">
        <button type="button" id="resetBtn">Reset</button>
        <div class="control-seed">
          seed <span id="seedDisplay" class="mono">—</span>
        </div>
      </div>
    </div>

    <!-- == Live readouts ===================================================== -->
    <div class="sketch-readout">
      <span class="readout-flip">Coin: <span id="coinDisplay" class="coin-pip"></span></span>
      <span class="readout-count">Flips: <span id="flipCountDisplay" class="mono">0</span></span>
    </div>

    <!-- == Run vectors ======================================================= -->
    <div class="sketch-row">
      <span class="row-label">Current run:</span>
      <div id="currentRunVector"></div>
    </div>
    <div class="sketch-row">
      <span class="row-label">Longest run:</span>
      <div id="longestRunVector"></div>
    </div>

    <!-- == Histograms ======================================================== -->
    <div class="sketch-histograms">
      <div id="runHistogram"></div>
      <div id="longestRunHistogram"></div>
    </div>

    <figcaption class="sketch-caption">
      Distribution of heads-runs in repeated fair-coin flips. Theoretical
      curves overlaid in outline.
    </figcaption>
  </figure>
</body>
</html>
