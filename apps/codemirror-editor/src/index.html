<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeMirror Editor</title>

  <!-- ays-dialog shared component -->
  <script type="module" src="charmiq://../../shared/ays-dialog"></script>

  <!-- CodeMirror 5 + language modes -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/sass/sass.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/jsx/jsx.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/clike/clike.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/display/placeholder.js"></script>

  <!-- Google Fonts for the editor UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
</head>
<body>
  <div class="app">
    <!-- == Header / Tab Bar ================================================== -->
    <div class="header">
      <div class="tab-bar" id="tabBar"></div>
      <button class="add-tab-btn" id="addTabBtn" title="New Tab">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
      </button>
      <button class="hamburger-btn" id="hamburgerBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16"/><path d="M4 12h16"/><path d="M4 19h16"/></svg>
      </button>
      <div class="header-right">
        <div class="icon-group">
          <button class="settings-btn" id="copyContentBtn" title="Copy content to clipboard">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184" /></svg>
          </button>
          <button class="settings-btn" id="exportIconBtn" title="Export">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
          </button>
          <button class="settings-btn" id="importIconBtn" title="Import">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" /></svg>
          </button>
        </div>
        <div class="icon-group">
          <div class="settings-container">
            <button class="settings-btn" id="settingsBtn">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>
            </button>
            <div class="settings-menu" id="settingsMenu">
              <div class="settings-section">
                <div class="settings-label">Mode</div>
                <select class="settings-dropdown" id="modeSelect">
                  <option value="css">CSS</option>
                  <option value="htmlmixed">HTML</option>
                  <option value="javascript">JavaScript</option>
                  <option value="application/json">JSON</option>
                  <option value="jsx">JSX</option>
                  <option value="markdown" selected>Markdown</option>
                  <option value="text/x-scss">Sass/SCSS</option>
                  <option value="text/typescript">TypeScript</option>
                  <option value="text/typescript-jsx">TSX</option>
                  <option value="x-shader/x-fragment">GLSL (Fragment)</option>
                  <option value="x-shader/x-vertex">GLSL (Vertex)</option>
                  <option value="xml">XML</option>
                </select>
              </div>
              <div class="settings-section">
                <div class="settings-label">Editor Options</div>
                <div class="settings-toggle" data-option="lineNumbers">
                  <span class="settings-toggle-label">Line Numbers</span>
                  <div class="toggle-switch active"></div>
                </div>
                <div class="settings-toggle" data-option="lineWrapping">
                  <span class="settings-toggle-label">Line Wrapping</span>
                  <div class="toggle-switch"></div>
                </div>
                <div class="settings-toggle" data-option="smartIndent">
                  <span class="settings-toggle-label">Smart Indent</span>
                  <div class="toggle-switch active"></div>
                </div>
                <div class="settings-toggle" data-option="indentWithTabs">
                  <span class="settings-toggle-label">Indent With Tabs</span>
                  <div class="toggle-switch"></div>
                </div>
              </div>
              <div class="settings-section">
                <div class="settings-label">Tabs</div>
                <div class="settings-number">
                  <span class="settings-number-label">Max Tabs</span>
                  <input type="number" class="settings-number-input" id="maxTabsInput" min="0" value="0" title="0 = unlimited">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <input type="file" accept=".md,.markdown,.txt,.html,.js,.jsx,.ts,.tsx,.json,.css,.scss,.sass,.xml,.frag,.fs,.vert,.vs,.glsl" class="hidden-file-input" id="fileInput">

    <!-- == AYS Dialog (close tab confirmation) =============================== -->
    <ays-dialog id="closeTabDialog" type="error" primary-text="Delete" cancel-text="Cancel">
      <svg slot="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" /></svg>
      <span slot="title">Delete Tab?</span>
      <span slot="message" id="closeTabMessage">Are you sure you want to delete this tab?</span>
    </ays-dialog>

    <!-- == Editor ============================================================ -->
    <div class="editor-container">
      <textarea id="editor"></textarea>
    </div>

    <!-- == Mobile Menu ======================================================= -->
    <div class="mobile-menu" id="mobileMenu">
      <div class="mobile-menu-content">
        <div class="mobile-menu-header">
          <div class="app-title">CodeMirror Editor</div>
          <button class="mobile-menu-close" id="mobileMenuClose">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
          </button>
        </div>
        <div class="mobile-menu-items">
          <div class="mobile-menu-section">
            <button class="mobile-menu-item" id="mobileCopyContent">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184" /></svg>
              <span>Copy Content</span>
            </button>
            <button class="mobile-menu-item" id="mobileExport">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
              <span>Export</span>
            </button>
            <button class="mobile-menu-item" id="mobileImport">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" /></svg>
              <span>Import</span>
            </button>
          </div>
          <div class="mobile-menu-section">
            <div class="mobile-menu-label">Mode</div>
            <select class="mobile-menu-dropdown" id="mobileModeSelect">
              <option value="css">CSS</option>
              <option value="htmlmixed">HTML</option>
              <option value="javascript">JavaScript</option>
              <option value="application/json">JSON</option>
              <option value="jsx">JSX</option>
              <option value="markdown" selected>Markdown</option>
              <option value="text/x-scss">Sass/SCSS</option>
              <option value="text/typescript">TypeScript</option>
              <option value="text/typescript-jsx">TSX</option>
              <option value="x-shader/x-fragment">GLSL (Fragment)</option>
              <option value="x-shader/x-vertex">GLSL (Vertex)</option>
              <option value="xml">XML</option>
            </select>
          </div>
          <div class="mobile-menu-section">
            <div class="mobile-menu-label">Editor Options</div>
            <div class="mobile-menu-toggle" data-option="lineNumbers">
              <span class="mobile-menu-toggle-label">Line Numbers</span>
              <div class="toggle-switch active"></div>
            </div>
            <div class="mobile-menu-toggle" data-option="lineWrapping">
              <span class="mobile-menu-toggle-label">Line Wrapping</span>
              <div class="toggle-switch"></div>
            </div>
            <div class="mobile-menu-toggle" data-option="smartIndent">
              <span class="mobile-menu-toggle-label">Smart Indent</span>
              <div class="toggle-switch active"></div>
            </div>
            <div class="mobile-menu-toggle" data-option="indentWithTabs">
              <span class="mobile-menu-toggle-label">Indent With Tabs</span>
              <div class="toggle-switch"></div>
            </div>
          </div>
          <div class="mobile-menu-section">
            <div class="mobile-menu-label">Tabs</div>
            <div class="mobile-menu-number">
              <span class="mobile-menu-number-label">Max Tabs</span>
              <input type="number" class="mobile-menu-number-input" id="mobileMaxTabsInput" min="0" value="0" title="0 = unlimited">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
